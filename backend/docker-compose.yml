version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: vantis-mail-db
    environment:
      POSTGRES_DB: vantis_mail
      POSTGRES_USER: vantis_mail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantis_mail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vantis-mail-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vantis-mail-backend
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DATABASE_URL: postgresql://vantis_mail:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/vantis_mail
      DATABASE_MAX_CONNECTIONS: 10
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRATION: 86400
      CRYPTO_KEY_DERIVATION_ITERATIONS: 100000
      CRYPTO_MEMORY_COST: 65536
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-your-smtp-username}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-smtp-password}
      MAX_ATTACHMENT_SIZE: 26214400
      STORAGE_PATH: /app/storage
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8080:8080"
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vantis-mail-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local

networks:
  vantis-mail-network:
    driver: bridge