sonar.projectKey=vantisCorp_V-Mail
sonar.organization=vantiscorp
sonar.projectName=V-Mail
sonar.projectVersion=1.5.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**,**/__tests__/**,**/__mocks__/**

sonar.javascript.node.maxspace=4096
sonar.scm.provider=git

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300