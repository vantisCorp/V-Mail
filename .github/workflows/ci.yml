name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install ESLint
      run: npm install -g eslint@8
      
    - name: Create ESLint config
      run: |
        echo '{
          "env": {
            "browser": true,
            "es2021": true
          },
          "extends": "eslint:recommended",
          "parserOptions": {
            "ecmaVersion": "latest",
            "sourceType": "module"
          },
          "rules": {
            "no-unused-vars": "warn",
            "no-console": "off"
          }
        }' > .eslintrc.json
      
    - name: Lint JavaScript
      run: eslint js/app.js --format stylish || true

  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Validate HTML syntax
      run: |
        # Check if HTML file exists and is not empty
        if [ -f index.html ] && [ -s index.html ]; then
          echo "✓ HTML file exists and is not empty"
          
          # Check for basic HTML structure
          if grep -q "<!DOCTYPE html>" index.html && \
             grep -q "<html" index.html && \
             grep -q "</html>" index.html; then
            echo "✓ HTML structure is valid"
          else
            echo "✗ HTML structure is invalid"
            exit 1
          fi
        else
          echo "✗ HTML file is missing or empty"
          exit 1
        fi

  test-responsive:
    name: Test Responsiveness
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check CSS Media Queries
      run: |
        if grep -q "@media" css/style.css; then
          echo "✓ Responsive design detected"
        else
          echo "✗ No responsive design found"
          exit 1
        fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run Security Scanner
      uses: actions/github-script@v6
      with:
        script: |
          console.log('Running security checks...');
          // Add custom security checks here

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to Preview
      run: |
        echo "Deploying preview for PR #${{ github.event.pull_request.number }}"
        # Add deployment logic here

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [lint, validate-html, test-responsive, security-scan]
    if: always()
    
    steps:
    - name: Send Notification
      run: |
        if [ "${{ needs.lint.result }}" == "success" ] && \
           [ "${{ needs.validate-html.result }}" == "success" ] && \
           [ "${{ needs.test-responsive.result }}" == "success" ] && \
           [ "${{ needs.security-scan.result }}" == "success" ]; then
          echo "✅ All checks passed!"
        else
          echo "⚠️ Some checks had warnings (non-blocking)"
          echo "Lint: ${{ needs.lint.result }}"
          echo "HTML: ${{ needs.validate-html.result }}"
          echo "Responsive: ${{ needs.test-responsive.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
        fi