name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run TypeScript type check
      run: npm run type-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test -- --run
      
    - name: Generate coverage report
      run: npm run test:coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Validate HTML syntax
      run: |
        # Check if HTML file exists and is not empty
        if [ -f index.html ] && [ -s index.html ]; then
          echo "✓ HTML file exists and is not empty"
          
          # Check for basic HTML structure
          if grep -q "<!DOCTYPE html>" index.html && \
             grep -q "<html" index.html && \
             grep -q "</html>" index.html; then
            echo "✓ HTML structure is valid"
          else
            echo "✗ HTML structure is invalid"
            exit 1
          fi
        else
          echo "✗ HTML file is missing or empty"
          exit 1
        fi

  test-responsive:
    name: Test Responsiveness
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check CSS Media Queries
      run: |
        if grep -q "@media" css/style.css; then
          echo "✓ Responsive design detected"
        else
          echo "✗ No responsive design found"
          exit 1
        fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
      
    - name: Check for security issues
      run: |
        # Check for common security issues
        if grep -r "alert(" js/ --include="*.js"; then
          echo "⚠️  Warning: alert() found in code"
        fi
        if grep -r "prompt(" js/ --include="*.js"; then
          echo "⚠️  Warning: prompt() found in code"
        fi
        if grep -r "eval(" js/ --include="*.js"; then
          echo "⚠️  Warning: eval() found in code"
        fi

  build:
    name: Build Project
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build
      run: npm run build
      
    - name: Run TypeScript type check
      run: npm run type-check

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [lint, test, validate-html, test-responsive, security-scan, build]
    if: always()
    
    steps:
    - name: Send Notification
      run: |
        if [ "${{ needs.lint.result }}" == "success" ] && \
           [ "${{ needs.test.result }}" == "success" ] && \
           [ "${{ needs.validate-html.result }}" == "success" ] && \
           [ "${{ needs.test-responsive.result }}" == "success" ] && \
           [ "${{ needs.security-scan.result }}" == "success" ] && \
           [ "${{ needs.build.result }}" == "success" ]; then
          echo "✅ All checks passed!"
        else
          echo "⚠️  Some checks had warnings or failed"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "HTML: ${{ needs.validate-html.result }}"
          echo "Responsive: ${{ needs.test-responsive.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Build: ${{ needs.build.result }}"
        fi