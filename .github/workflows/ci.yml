name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit --no-fund
      
    - name: Run ESLint
      run: npm run lint
      timeout-minutes: 2

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit --no-fund
      
    - name: Run tests
      run: npm test
      timeout-minutes: 5

  build:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit --no-fund
      
    - name: Run build
      run: npm run build
      timeout-minutes: 5
      
    - name: Check build output
      run: |
        if [ -d "dist" ] && [ -f "dist/index.html" ]; then
          echo "✓ Build successful"
        else
          echo "✗ Build failed"
          exit 1
        fi

  validate-resp:
    name: Test Responsiveness
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check CSS Media Queries
      run: |
        if grep -r "@media" src/styles/ --include="*.css" 2>/dev/null; then
          echo "✓ Responsive design detected"
        else
          echo "✗ No responsive design found"
          exit 1
        fi

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [lint, test, build, validate-resp]
    if: always()
    
    steps:
    - name: Send Notification
      run: |
        if [ "${{ needs.lint.result }}" == "success" ] && \
           [ "${{ needs.test.result }}" == "success" ] && \
           [ "${{ needs.build.result }}" == "success" ] && \
           [ "${{ needs.validate-resp.result }}" == "success" ]; then
          echo "✅ All checks passed!"
        else
          echo "⚠️ Some checks failed"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Responsive: ${{ needs.validate-resp.result }}"
        fi